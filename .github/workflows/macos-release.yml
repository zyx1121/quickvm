name: macos-release

# tag v* 觸發：build（Rust helper + Swift 殼）→ Developer ID 簽 → notarize → staple → zip → GitHub Release。
# 與 ci.yml 分開：ci.yml 跑 PR/push 的 Rust build/clippy/test，此 workflow 只在 tag 跑，不碰 PR CI。
# 簽名私鑰與 notary 憑證走 repo secret（接受私鑰進 CI）。
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write          # gh release 需要寫 release
    steps:
      - uses: actions/checkout@v4

      # hybrid build：make release 會 cargo build helper，需先裝 Rust toolchain。
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Developer ID Application cert（.p12 base64 進 secret）匯入暫時 keychain。
      - name: Import signing certificate
        env:
          DEV_ID_CERT_P12: ${{ secrets.DEV_ID_CERT_P12 }}
          DEV_ID_CERT_PASSWORD: ${{ secrets.DEV_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$DEV_ID_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$DEV_ID_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"

      # App Store Connect API key（.p8 base64 進 secret）→ notarytool keychain profile。
      - name: Store notary credentials
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
        run: |
          echo "$AC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials ci-notary \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID"
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      # macos-app 的 release target：cargo build helper + swift build 殼 + Developer ID 簽 + notarize + staple。
      # 只把 DEV_ID_APP / NOTARY_PROFILE override 進去（其餘沿用 Makefile）。
      - name: Build, sign, notarize, staple
        env:
          DEV_ID_APP: ${{ secrets.DEV_ID_APP }}
        run: make -C macos-app release DEV_ID_APP="$DEV_ID_APP" NOTARY_PROFILE=ci-notary

      # release target 產的是 stapled .app（非 dmg），打成 zip 再發 release。
      - name: Zip app
        run: ditto -c -k --keepParent macos-app/build/QuicKVM.app "$RUNNER_TEMP/QuicKVM-$GITHUB_REF_NAME.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "$RUNNER_TEMP/QuicKVM-$GITHUB_REF_NAME.zip" --title "$GITHUB_REF_NAME" --generate-notes
